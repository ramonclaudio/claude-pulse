<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chats</title>
<style>
:root,html[data-theme="dark"]{--bg:#262624;--sidebar-bg:#262624;--card:#141413;--border:#3d3d3a;--text:#faf9f5;--dim:#73726c;--faint:#53524e;--accent:#d97757;--user-bg:#141413;--user-border:transparent;--code-bg:#1a1a18;--think-text:#73726c;--cream:#faf9f5}
html[data-theme="light"]{--bg:#faf9f5;--sidebar-bg:#faf9f5;--card:#f0eee6;--border:#e0ddd4;--text:#141413;--dim:#73726c;--faint:#9a9990;--accent:#c2693f;--user-bg:#f0eee6;--user-border:transparent;--code-bg:#f0eee6;--think-text:#73726c;--cream:#141413}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}

/* Sidebar - matches claude.ai */
.sidebar{width:288px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-head{padding:16px 16px 8px;flex-shrink:0}
.sidebar-head h1{font-size:18px;font-weight:700;color:var(--cream);display:flex;align-items:center;justify-content:space-between}
.sidebar-head h1 a{font-size:11px;color:var(--dim);text-decoration:none;font-weight:400}
.sidebar-head h1 a:hover{color:var(--accent)}
.sidebar-search{margin:10px 0 0;position:relative}
.sidebar-search input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 32px;color:var(--text);font-size:13px;outline:none}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-search::before{content:"\1F50D";position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.4}
.sidebar-sub{font-size:11px;color:var(--dim);margin-top:8px}
.sess-list{flex:1;overflow-y:auto;padding:4px 8px}
.sess-item{padding:6px 16px;cursor:pointer;border-radius:6px;margin-bottom:1px}
.sess-item:hover{background:var(--card)}
.sess-item.active{background:var(--card)}
.sess-item .title{font-size:12px;font-weight:430;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:16px}
.sess-item .meta{font-size:11px;color:var(--dim);margin-top:2px}

/* Chat area */
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.chat-head{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-head .title{font-size:14px;font-weight:500;color:var(--cream);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-head .controls{display:flex;gap:6px;align-items:center}
.chat-head .controls label{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:3px;cursor:pointer}
.chat-head .controls input[type="checkbox"]{accent-color:var(--accent)}
.chat-head .btn{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--dim);cursor:pointer}
.chat-head .btn:hover{border-color:var(--accent);color:var(--accent)}
.messages{flex:1;overflow-y:auto;padding:24px 0}
.msg-wrap{max-width:768px;margin:0 auto;padding:0 24px}

/* User message - claude.ai exact */
.msg-user{display:flex;justify-content:flex-end;margin-bottom:20px}
.msg-user .bubble{background:var(--user-bg);border-radius:12px;padding:10px 16px;max-width:85%;font-size:16px;line-height:24px;white-space:pre-wrap;word-break:break-word}

/* Assistant message - claude.ai serif + exact sizing */
.msg-asst{margin-bottom:28px}
.msg-asst .text{font-family:Georgia,"Times New Roman",serif;font-size:16px;line-height:26.4px;word-break:break-word;overflow-wrap:break-word}
.msg-asst .text p{margin:0 0 12px}
.msg-asst .text p:last-child{margin-bottom:0}
.msg-asst .text h1,.msg-asst .text h2,.msg-asst .text h3,.msg-asst .text h4{font-family:system-ui,sans-serif;margin:20px 0 8px;color:var(--cream);line-height:1.3}
.msg-asst .text h1{font-size:22px}.msg-asst .text h2{font-size:18px}.msg-asst .text h3{font-size:16px;font-weight:600}
.msg-asst .text code{background:var(--code-bg);padding:2px 6px;border-radius:4px;font-family:"Fira Code","SF Mono",Menlo,monospace;font-size:13px}
.msg-asst .text pre{background:var(--code-bg);border-radius:8px;padding:14px 16px;margin:12px 0;overflow-x:auto;line-height:1.5}
.msg-asst .text pre code{background:none;padding:0;font-size:13px;color:var(--text)}
.msg-asst .text ul,.msg-asst .text ol{margin:8px 0 12px 20px}
.msg-asst .text li{margin:4px 0;line-height:1.6}
.msg-asst .text blockquote{border-left:3px solid var(--accent);margin:12px 0;padding:4px 16px;color:var(--dim);font-style:italic}
.msg-asst .text table{border-collapse:collapse;margin:12px 0;font-size:14px;font-family:system-ui,sans-serif;width:100%}
.msg-asst .text th,.msg-asst .text td{border:1px solid var(--border);padding:6px 10px;text-align:left}
.msg-asst .text th{background:var(--code-bg);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.msg-asst .text hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.msg-asst .text a{color:var(--accent);text-decoration:none}
.msg-asst .text a:hover{text-decoration:underline}
.msg-asst .text strong{font-weight:700;color:var(--cream)}
.msg-asst .meta{font-size:11px;color:var(--dim);margin-top:8px}

/* Thinking block - claude.ai exact */
.think-toggle{font-size:14px;font-weight:430;color:var(--think-text);cursor:pointer;padding:4px 0;margin-bottom:6px;user-select:none;display:flex;align-items:center;gap:8px}
.think-toggle:hover{color:var(--text)}
.think-body{background:var(--code-bg);border-radius:8px;padding:12px 16px;font-size:13px;line-height:1.6;color:var(--dim);max-height:400px;overflow-y:auto;white-space:pre-wrap;font-family:"Fira Code","SF Mono",Menlo,monospace;margin-bottom:12px;display:none}
.think-body.open{display:block}

/* Tool blocks - claude.ai exact */
.tool-card{background:var(--card);border-radius:12px;margin:10px 0;overflow:hidden}
.tool-head{padding:6px 16px;font-size:14px;font-weight:430;color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.tool-head:hover{opacity:.8}
.tool-head .chevron{font-size:12px;color:var(--dim);transition:transform .15s}
.tool-head .chevron.open{transform:rotate(90deg)}
.tool-body{padding:12px 16px;font-size:13px;line-height:1.6;color:var(--dim);max-height:500px;overflow-y:auto;white-space:pre-wrap;font-family:"Fira Code","SF Mono",Menlo,monospace;border-top:1px solid var(--border);display:none}
.tool-body.open{display:block}

/* Result blocks */
.result-card{background:var(--card);border-radius:12px;margin:10px 0;overflow:hidden}
.result-card.error{outline:1px solid rgba(217,119,87,.3)}
.result-head{padding:6px 16px;font-size:13px;font-weight:430;color:var(--dim);cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between}
.result-card.error .result-head{color:var(--accent)}
.result-head .chevron{font-size:12px;color:var(--dim)}
.result-body{padding:12px 16px;font-size:13px;line-height:1.6;color:var(--dim);max-height:500px;overflow-y:auto;white-space:pre-wrap;font-family:"Fira Code","SF Mono",Menlo,monospace;display:none;border-top:1px solid var(--border)}
.result-body.open{display:block}

/* Progress & system */
.progress-line{font-size:11px;color:var(--faint);padding:2px 0}
.system-line{font-size:11px;color:var(--think-text);padding:4px 10px;background:var(--code-bg);border-radius:6px;margin:4px 0}

.empty{color:var(--dim);text-align:center;padding:60px 20px;font-size:14px}
.load-more{text-align:center;padding:12px;font-size:12px;color:var(--accent);cursor:pointer}
.load-more:hover{text-decoration:underline}
@media(max-width:768px){.sidebar{width:240px}}
</style></head><body>

<div class="sidebar">
  <div class="sidebar-head">
    <h1>Chats <a href="/">Dashboard</a></h1>
    <div class="sidebar-search"><input id="csearch" placeholder="Search your chats..." /></div>
    <div class="sidebar-sub" id="cstats"></div>
  </div>
  <div class="sess-list" id="sidebar"></div>
</div>

<div class="chat-area">
  <div class="chat-head">
    <span class="title" id="chatTitle">Select a conversation</span>
    <div class="controls">
      <label><input type="checkbox" id="showThinking" checked> thinking</label>
      <label><input type="checkbox" id="showTools" checked> tools</label>
      <label><input type="checkbox" id="showProgress"> progress</label>
      <button class="btn" onclick="toggleTheme()" id="themeBtn">&#9788;</button>
    </div>
  </div>
  <div class="messages" id="chat"><div class="empty">Select a conversation from the sidebar</div></div>
</div>

<script>
function toggleTheme(){const t=document.documentElement.dataset.theme==="light"?"dark":"light";document.documentElement.dataset.theme=t;localStorage.setItem("theme",t);document.getElementById("themeBtn").textContent=t==="light"?"\u263e":"\u2606"}
(function(){const t=localStorage.getItem("theme")||(matchMedia("(prefers-color-scheme:light)").matches?"light":"dark");document.documentElement.dataset.theme=t;document.getElementById("themeBtn").textContent=t==="light"?"\u263e":"\u2606"})();

const F=s=>fetch(s).then(r=>r.json());
const $=id=>document.getElementById(id);
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

// Minimal markdown parser. No deps.
function md(src){
  if(!src)return"";
  const e=esc;
  let out="",lines=src.split("\n"),i=0;
  while(i<lines.length){
    const L=lines[i];
    // Fenced code block
    const fence=L.match(/^```(\w*)/);
    if(fence){
      const lang=fence[1];
      const codeLines=[];
      i++;
      while(i<lines.length&&!lines[i].startsWith("```")){codeLines.push(lines[i]);i++}
      i++; // skip closing ```
      out+='<pre><code'+(lang?' class="language-'+e(lang)+'"':'')+'>'+e(codeLines.join("\n"))+'</code></pre>';
      continue;
    }
    // Heading
    const hm=L.match(/^(#{1,4})\s+(.*)/);
    if(hm){const lv=hm[1].length;out+='<h'+lv+'>'+inline(hm[2])+'</h'+lv+'>';i++;continue}
    // HR
    if(/^(-{3,}|\*{3,}|_{3,})\s*$/.test(L)){out+='<hr>';i++;continue}
    // Blockquote
    if(L.startsWith("> ")){
      const bq=[];
      while(i<lines.length&&lines[i].startsWith("> ")){bq.push(lines[i].slice(2));i++}
      out+='<blockquote>'+md(bq.join("\n"))+'</blockquote>';
      continue;
    }
    // Unordered list
    if(/^[\-\*]\s/.test(L)){
      const items=[];
      while(i<lines.length&&/^[\-\*]\s/.test(lines[i])){items.push(lines[i].replace(/^[\-\*]\s+/,""));i++}
      out+='<ul>'+items.map(x=>'<li>'+inline(x)+'</li>').join("")+'</ul>';
      continue;
    }
    // Ordered list
    if(/^\d+\.\s/.test(L)){
      const items=[];
      while(i<lines.length&&/^\d+\.\s/.test(lines[i])){items.push(lines[i].replace(/^\d+\.\s+/,""));i++}
      out+='<ol>'+items.map(x=>'<li>'+inline(x)+'</li>').join("")+'</ol>';
      continue;
    }
    // Table
    if(L.includes("|")&&i+1<lines.length&&/^\|?[\s\-:|]+\|/.test(lines[i+1])){
      const hdr=parseRow(L),rows=[];
      i+=2; // skip header + separator
      while(i<lines.length&&lines[i].includes("|")){rows.push(parseRow(lines[i]));i++}
      out+='<table><thead><tr>'+hdr.map(c=>'<th>'+inline(c)+'</th>').join("")+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+r.map(c=>'<td>'+inline(c)+'</td>').join("")+'</tr>').join("")+'</tbody></table>';
      continue;
    }
    // Empty line
    if(!L.trim()){i++;continue}
    // Paragraph: collect contiguous non-empty, non-special lines
    const pLines=[L];i++;
    while(i<lines.length&&lines[i].trim()&&!/^(```|#{1,4}\s|[-*]\s|\d+\.\s|>|[-*_]{3,}|\|)/.test(lines[i])){pLines.push(lines[i]);i++}
    out+='<p>'+inline(pLines.join("\n"))+'</p>';
  }
  return out;
}
function parseRow(r){return r.replace(/^\||\|$/g,"").split("|").map(c=>c.trim())}
function inline(s){
  return esc(s)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
}
const tok=n=>{if(!n)return"0";if(n>1e6)return(n/1e6).toFixed(1)+"M";if(n>1e3)return(n/1e3).toFixed(1)+"K";return n+""};
const nm=p=>p?p.split("/").pop():"?";

function relTime(ts){
  if(!ts)return"";
  const d=Date.now()-new Date(ts).getTime(),m=d/60000,h=m/60,dy=h/24;
  if(m<1)return"just now";if(m<60)return Math.round(m)+"m ago";if(h<24)return Math.round(h)+"h ago";
  if(dy<7)return Math.round(dy)+"d ago";if(dy<30)return Math.round(dy/7)+"w ago";return Math.round(dy/30)+"mo ago";
}

let uid=0;
function toggleId(id){const el=document.getElementById(id);if(el)el.classList.toggle("open")}

let allSessions=[];
let currentMsgs=[];
let currentSid="";
let chatTotal=0;

async function loadSessions(){
  const[sessions,stats]=await Promise.all([F("/api/chat/sessions"),F("/api/conversation-stats")]);
  allSessions=sessions;
  const u=stats.byType?.find(t=>t.type==="user")?.n||0;
  const a=stats.byType?.find(t=>t.type==="assistant")?.n||0;
  $("cstats").textContent=stats.total.n.toLocaleString()+" messages \xb7 "+u.toLocaleString()+" user \xb7 "+a.toLocaleString()+" assistant";
  renderSessions(sessions);
}

function renderSessions(sessions){
  $("sidebar").innerHTML=sessions.map(s=>{
    const title=esc(s.first_msg||"Untitled").slice(0,80);
    const time=relTime(s.last_ts||s.first_ts);
    return '<div class="sess-item" data-id="'+s.session_id+'" onclick="loadChat(this)"><div class="title">'+title+'</div><div class="meta">'+time+(s.msg_count?' \xb7 '+s.msg_count+' msgs':'')+'</div></div>';
  }).join("")||'<div class="empty">no conversations</div>';
}

async function loadChat(el){
  document.querySelectorAll(".sess-item").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
  currentSid=el.dataset.id;
  const title=el.querySelector(".title")?.textContent||"";
  $("chatTitle").textContent=title;
  $("chat").innerHTML='<div class="empty">loading...</div>';
  const data=await F("/api/chat/"+currentSid+"?limit=500&offset=0");
  currentMsgs=data.msgs;
  chatTotal=data.total;
  renderChat();
  if(chatTotal>500){
    const el2=document.createElement("div");
    el2.className="load-more";
    el2.textContent="Load all "+chatTotal+" messages";
    el2.onclick=async()=>{el2.textContent="loading...";const all=await F("/api/chat/"+currentSid+"?limit="+chatTotal+"&offset=0");currentMsgs=all.msgs;renderChat()};
    $("chat").prepend(el2);
  }
}

function renderChat(){
  const showThinking=$("showThinking").checked;
  const showTools=$("showTools").checked;
  const showProgress=$("showProgress").checked;

  $("chat").innerHTML='<div class="msg-wrap">'+currentMsgs.map(m=>{
    const t=m.type;
    const content=m.content||"";

    if(t==="progress"&&showProgress)return'<div class="progress-line">'+esc(content).slice(0,200)+'</div>';
    if(t==="progress")return"";
    if(t==="system"||t==="summary"||t==="file-history-snapshot"||t==="queue-operation"||t==="pr-link"||t==="last-prompt"||t==="custom-title")return"";
    if(t!=="user"&&t!=="assistant")return"";

    // User messages: if it contains tool_result tags, render those as tool results, not user bubbles
    if(m.role==="user"){
      if(content.includes("<tool_result")){
        // This is a tool result message, render as tool result card
        const resultParts=content.split(/(<tool_result[^>]*>|<\/tool_result>)/);
        let rhtml="",inR=false,rMeta="";
        for(const rp of resultParts){
          if(rp.startsWith("<tool_result")){inR=true;rMeta=rp;continue}
          if(rp==="</tool_result>"){inR=false;continue}
          if(inR&&showTools){
            const isErr=rMeta.includes('error="true"');
            const id="ur"+(uid++);
            rhtml+='<div class="result-card'+(isErr?" error":"")+'"><div class="result-head" onclick="toggleId(\''+id+'\')"><span>'+(isErr?"Error":"Result")+'</span><span class="chevron">&#9656;</span></div>';
            rhtml+='<div class="result-body" id="'+id+'">'+esc(rp.trim()).slice(0,10000)+'</div></div>';
          }else if(!inR){
            const text=rp.trim();
            if(text)rhtml+='<div class="msg-user"><div class="bubble">'+esc(text)+'</div></div>';
          }
        }
        return rhtml;
      }
      return'<div class="msg-user"><div class="bubble">'+esc(content)+'</div></div>';
    }

    // Assistant
    let html="";
    const parts=content.split(/(<thinking>|<\/thinking>|<tool_use[^>]*>|<\/tool_use>|<tool_result[^>]*>|<\/tool_result>)/);
    let inThinking=false,inTool=false,inResult=false,toolMeta="",resultMeta="";

    for(const part of parts){
      if(part==="<thinking>"){inThinking=true;continue}
      if(part==="</thinking>"){inThinking=false;continue}
      if(part.startsWith("<tool_use")){inTool=true;toolMeta=part;continue}
      if(part==="</tool_use>"){inTool=false;continue}
      if(part.startsWith("<tool_result")){inResult=true;resultMeta=part;continue}
      if(part==="</tool_result>"){inResult=false;continue}

      if(inThinking&&showThinking){
        const id="th"+(uid++);
        html+='<div class="think-toggle" onclick="toggleId(\''+id+'\')">Thinking ('+part.length.toLocaleString()+' chars) &#9656;</div>';
        html+='<div class="think-body" id="'+id+'">'+esc(part)+'</div>';
      }else if(inTool&&showTools){
        const nameMatch=toolMeta.match(/name="([^"]+)"/);
        const tn=nameMatch?nameMatch[1]:"tool";
        const id="tb"+(uid++);
        html+='<div class="tool-card"><div class="tool-head" onclick="toggleId(\''+id+'\');this.querySelector(\'.chevron\').classList.toggle(\'open\')"><span>&#9654; '+esc(tn)+'</span><span class="chevron">&#9656;</span></div>';
        html+='<div class="tool-body" id="'+id+'">'+esc(part.trim())+'</div></div>';
      }else if(inResult&&showTools){
        const isErr=resultMeta.includes('error="true"');
        const id="tr"+(uid++);
        html+='<div class="result-card'+(isErr?" error":"")+'"><div class="result-head" onclick="toggleId(\''+id+'\')"><span>'+(isErr?"Error":"Result")+'</span><span class="chevron">&#9656;</span></div>';
        html+='<div class="result-body" id="'+id+'">'+esc(part.trim()).slice(0,10000)+'</div></div>';
      }else if(!inThinking&&!inTool&&!inResult){
        const text=part.trim();
        if(text)html+=md(text);
      }
    }

    if(!html.trim())return"";
    const meta=[];
    if(m.model)meta.push(nm(m.model));
    if(m.input_tokens||m.output_tokens)meta.push(tok(m.input_tokens||0)+" in "+tok(m.output_tokens||0)+" out");
    return'<div class="msg-asst"><div class="text">'+html+'</div>'+(meta.length?'<div class="meta">'+meta.join(" \xb7 ")+'</div>':'')+'</div>';
  }).filter(Boolean).join("")+'</div>';

  requestAnimationFrame(()=>{$("chat").scrollTop=$("chat").scrollHeight});
}

["showThinking","showTools","showProgress"].forEach(id=>{
  $(id).addEventListener("change",()=>{if(currentMsgs.length)renderChat()});
});

$("csearch").addEventListener("input",async function(){
  const q=this.value.trim();
  if(!q){renderSessions(allSessions);return}
  if(q.length<2)return;
  try{
    const res=await F("/api/chat-search?q="+encodeURIComponent(q));
    const sids=[...new Set(res.map(r=>r.session_id))];
    const fake=sids.map(sid=>{
      const msgs=res.filter(r=>r.session_id===sid);
      return{session_id:sid,first_ts:msgs[0]?.timestamp,last_ts:msgs[0]?.timestamp,msg_count:msgs.length,first_msg:msgs[0]?.content};
    });
    renderSessions(fake);
  }catch(e){renderSessions([])}
});

loadSessions();
</script></body></html>
